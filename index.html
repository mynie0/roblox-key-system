<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ByokuXMon | Private Script Hosting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0404;
            color: #e8d8d8;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        /* Scanlines effect */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: #0d0606;
            border: 1px solid #2a1515;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b1a1a, transparent);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #8b1a1a, #3d0a0a);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 800;
            color: #e8d8d8;
        }

        .logo-text h1 {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-text h1 span {
            color: #c41e1e;
        }

        .logo-text p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px;
            color: #8a6e6e;
            letter-spacing: 1px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            padding: 9px 22px;
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b1a1a, #c41e1e);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(196, 30, 30, 0.25);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #c41e1e;
            color: #c41e1e;
        }

        .btn-outline:hover {
            background: rgba(196, 30, 30, 0.1);
        }

        .btn-danger {
            background: rgba(180, 30, 30, 0.15);
            border: 1px solid #c41e1e;
            color: #c41e1e;
        }

        .btn-danger:hover {
            background: rgba(180, 30, 30, 0.3);
        }

        .btn-sm {
            padding: 5px 14px;
            font-size: 9px;
        }

        /* Cards */
        .card {
            background: #0d0606;
            border: 1px solid #2a1515;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            background: #120808;
            border-bottom: 1px solid #2a1515;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #c41e1e;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c41e1e;
            box-shadow: 0 0 8px #c41e1e;
            animation: pulse 2s infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .card-body {
            padding: 24px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #8a6e6e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0a0404;
            border: 1px solid #2a1515;
            border-radius: 6px;
            color: #e8d8d8;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #c41e1e;
            box-shadow: 0 0 8px rgba(196, 30, 30, 0.2);
        }

        .form-group textarea {
            font-family: monospace;
            resize: vertical;
            min-height: 250px;
        }

        .file-upload-area {
            border: 2px dashed #2a1515;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #0a0404;
        }

        .file-upload-area:hover {
            border-color: #c41e1e;
            background: rgba(196, 30, 30, 0.05);
        }

        /* Script List */
        .script-item {
            background: #0a0404;
            border: 1px solid #2a1515;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .script-info h4 {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #c41e1e;
            margin-bottom: 6px;
        }

        .script-info p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #8a6e6e;
        }

        .script-url {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: #8a6e6e;
            background: #0d0606;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #2a1515;
        }

        .script-url:hover {
            border-color: #c41e1e;
            color: #c41e1e;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            font-weight: 600;
        }

        .badge-private {
            background: rgba(196, 30, 30, 0.15);
            color: #c41e1e;
            border: 1px solid rgba(196, 30, 30, 0.3);
        }

        .badge-public {
            background: rgba(100, 100, 100, 0.15);
            color: #8a6e6e;
            border: 1px solid rgba(100, 100, 100, 0.3);
        }

        .badge-active {
            background: rgba(196, 30, 30, 0.15);
            color: #c41e1e;
            border: 1px solid rgba(196, 30, 30, 0.3);
        }

        .badge-expired {
            background: rgba(80, 20, 20, 0.3);
            color: #6a3a3a;
            border: 1px solid #4a2a2a;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #120808;
            border-left: 3px solid #c41e1e;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            border: 1px solid #2a1515;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-left-color: #8b1a1a;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 4, 4, 0.98);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0d0606;
            border: 1px solid #c41e1e;
            border-radius: 14px;
            width: 90%;
            max-width: 550px;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px 20px;
            background: #120808;
            border-bottom: 1px solid #2a1515;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #c41e1e;
        }

        .modal-close {
            cursor: pointer;
            color: #8a6e6e;
            font-size: 22px;
            line-height: 1;
        }

        .modal-close:hover {
            color: #c41e1e;
        }

        .modal-body {
            padding: 24px;
        }

        .hidden {
            display: none;
        }

        /* Code preview */
        .code-preview {
            background: #0a0404;
            border: 1px solid #2a1515;
            border-radius: 8px;
            padding: 14px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 350px;
            overflow: auto;
            color: #c4a0a0;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #6a4a4a;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            .script-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="scanlines"></div>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">SH</div>
            <div class="logo-text">
                <h1>BYOKUX<span>MON</span></h1>
                <p>PRIVATE SCRIPT HOSTING</p>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn btn-outline btn-sm" id="btnMyScripts">MY SCRIPTS</button>
            <button class="btn btn-primary btn-sm" id="btnUpload">UPLOAD SCRIPT</button>
        </div>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="uploadSection" class="card">
        <div class="card-header">
            <span class="card-title"><span class="pulse-dot"></span> UPLOAD NEW SCRIPT</span>
            <button class="btn btn-outline btn-sm" id="closeUploadBtn" style="display: none;">CLOSE</button>
        </div>
        <div class="card-body">
            <div class="grid-2">
                <div class="form-group">
                    <label>SCRIPT NAME</label>
                    <input type="text" id="scriptName" placeholder="ex: Auto Farm GUI v2">
                </div>
                <div class="form-group">
                    <label>CATEGORY</label>
                    <select id="scriptCategory">
                        <option value="Roblox Executor">Roblox Executor</option>
                        <option value="Utility">Utility</option>
                        <option value="Aimbot / ESP">Aimbot / ESP</option>
                        <option value="Macro / Auto">Macro / Auto</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>VISIBILITY</label>
                    <select id="scriptVisibility">
                        <option value="private">PRIVATE (Need Key to Access)</option>
                        <option value="public">PUBLIC (Anyone Can Access)</option>
                    </select>
                </div>
                <div class="form-group" id="keyRequireGroup" style="display: none;">
                    <label>REQUIRED KEY</label>
                    <input type="text" id="requiredKey" placeholder="ex: MY-SECRET-KEY-123">
                    <small style="color: #6a4a4a; display: block; margin-top: 4px;">User perlu key ini untuk akses script</small>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>EXPIRE DATE (OPTIONAL)</label>
                    <input type="date" id="expireDate">
                    <small style="color: #6a4a4a;">Kosongkan jika tidak ingin expired</small>
                </div>
                <div class="form-group">
                    <label>UPLOAD FROM FILE</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <span style="color:#8a6e6e;">📄 CLICK OR DRAG FILE HERE</span>
                        <input type="file" id="fileInput" accept=".lua,.txt,.js,.py" style="display: none;">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>SCRIPT CODE (LUA / JS / PYTHON)</label>
                <textarea id="scriptCode" placeholder="-- Paste your script here&#10;loadstring(game:HttpGet('...'))()"></textarea>
            </div>
            <button class="btn btn-primary" id="uploadScriptBtn" style="width: 100%;">UPLOAD SCRIPT</button>
        </div>
    </div>

    <!-- MY SCRIPTS SECTION -->
    <div id="myScriptsSection" class="card" style="display: none;">
        <div class="card-header">
            <span class="card-title"><span class="pulse-dot"></span> MY SCRIPTS</span>
            <button class="btn btn-outline btn-sm" id="closeMyScriptsBtn">CLOSE</button>
        </div>
        <div class="card-body" id="scriptsList">
            <div class="empty-state">LOADING...</div>
        </div>
    </div>
</div>

<!-- ACCESS SCRIPT MODAL -->
<div id="accessModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>PRIVATE SCRIPT PROTECTED</h3>
            <span class="modal-close" onclick="closeAccessModal()">×</span>
        </div>
        <div class="modal-body">
            <p style="margin-bottom: 16px; color: #8a6e6e;">Script ini bersifat PRIVATE. Masukkan key untuk mengakses:</p>
            <input type="text" id="accessKeyInput" placeholder="Enter your license key" style="width: 100%; padding: 10px; background: #0a0404; border: 1px solid #2a1515; color: #e8d8d8; border-radius: 6px;">
            <button class="btn btn-primary" onclick="verifyAndAccessScript()" style="width: 100%; margin-top: 16px;">VERIFY ACCESS</button>
            <div id="accessError" style="color: #c41e1e; font-size: 11px; margin-top: 12px;"></div>
        </div>
    </div>
</div>

<!-- SCRIPT VIEWER MODAL -->
<div id="scriptViewerModal" class="modal hidden">
    <div class="modal-content" style="max-width: 750px;">
        <div class="modal-header">
            <h3 id="viewerTitle">SCRIPT PREVIEW</h3>
            <span class="modal-close" onclick="closeViewerModal()">×</span>
        </div>
        <div class="modal-body">
            <div class="code-preview" id="scriptContentPreview"></div>
            <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-outline btn-sm" id="copyRawBtn">COPY RAW URL</button>
                <button class="btn btn-outline btn-sm" id="copyLoadstringBtn">COPY LOADSTRING</button>
            </div>
            <div id="rawUrlDisplay" style="margin-top: 14px; font-family: monospace; font-size: 10px; color: #6a4a4a; text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    let scriptsDatabase = [];
    let currentUser = "owner";
    let pendingAccessScript = null;

    function showToast(message, type) {
        var toast = document.createElement('div');
        toast.className = 'toast ' + (type || '');
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
    }

    function saveToLocal() {
        localStorage.setItem('bxm_scripts_hosting', JSON.stringify(scriptsDatabase));
    }

    function loadFromLocal() {
        var saved = localStorage.getItem('bxm_scripts_hosting');
        if (saved) {
            scriptsDatabase = JSON.parse(saved);
        } else {
            scriptsDatabase = [];
        }
        renderMyScripts();
    }

    function generateScriptId() {
        var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        var id = "";
        for (var i = 0; i < 6; i++) {
            id += chars.charAt(Math.floor(Math.random() * 36));
        }
        return "SCR-" + id;
    }

    function getRawUrl(scriptId) {
        return window.location.origin + window.location.pathname + "?raw=" + scriptId;
    }

    function getLoadstring(scriptId) {
        return "loadstring(game:HttpGet(\"" + getRawUrl(scriptId) + "\"))()";
    }

    function uploadScript() {
        var name = document.getElementById('scriptName').value.trim();
        var category = document.getElementById('scriptCategory').value;
        var visibility = document.getElementById('scriptVisibility').value;
        var code = document.getElementById('scriptCode').value;
        var requiredKey = document.getElementById('requiredKey').value.trim();
        var expireDate = document.getElementById('expireDate').value;

        if (!name) {
            showToast("Script name required", "error");
            return;
        }
        if (!code) {
            showToast("Script code required", "error");
            return;
        }

        var newScript = {
            id: generateScriptId(),
            name: name,
            category: category,
            visibility: visibility,
            code: code,
            requiredKey: (visibility === 'private' && requiredKey) ? requiredKey : null,
            expire: expireDate || null,
            createdAt: new Date().toISOString(),
            views: 0,
            owner: currentUser
        };

        scriptsDatabase.push(newScript);
        saveToLocal();
        renderMyScripts();

        document.getElementById('scriptName').value = '';
        document.getElementById('scriptCode').value = '';
        document.getElementById('requiredKey').value = '';
        document.getElementById('expireDate').value = '';

        showToast("Script uploaded: " + newScript.id);
        showUploadSection(false);
        showMyScripts(true);
    }

    function deleteScript(scriptId) {
        if (confirm("Delete this script permanently?")) {
            scriptsDatabase = scriptsDatabase.filter(function(s) { return s.id !== scriptId; });
            saveToLocal();
            renderMyScripts();
            showToast("Script deleted");
        }
    }

    function viewScript(script) {
        pendingAccessScript = script;

        var isExpired = script.expire && new Date(script.expire) < new Date();
        if (isExpired) {
            showToast("This script has expired!", "error");
            return;
        }

        if (script.visibility === 'public') {
            showScriptContent(script);
        } else {
            document.getElementById('accessModal').classList.remove('hidden');
            document.getElementById('accessKeyInput').value = '';
            document.getElementById('accessError').innerHTML = '';
        }
    }

    function verifyAndAccessScript() {
        var inputKey = document.getElementById('accessKeyInput').value.trim();
        var script = pendingAccessScript;

        if (!script) return;

        if (script.visibility === 'public') {
            showScriptContent(script);
            closeAccessModal();
            return;
        }

        if (script.requiredKey && script.requiredKey !== "") {
            if (inputKey === script.requiredKey) {
                showScriptContent(script);
                closeAccessModal();
            } else {
                document.getElementById('accessError').innerHTML = "Invalid key! Cannot access this script.";
            }
        } else {
            showScriptContent(script);
            closeAccessModal();
        }
    }

    function showScriptContent(script) {
        script.views = (script.views || 0) + 1;
        saveToLocal();
        renderMyScripts();

        document.getElementById('viewerTitle').innerHTML = script.name + ' <span style="font-size:10px;">(' + script.category + ')</span>';
        document.getElementById('scriptContentPreview').innerHTML = escapeHtml(script.code);
        document.getElementById('rawUrlDisplay').innerHTML = 'RAW URL: ' + getRawUrl(script.id) + '<br>LOADSTRING: ' + getLoadstring(script.id);

        document.getElementById('scriptViewerModal').classList.remove('hidden');
    }

    function copyRawUrl() {
        if (pendingAccessScript) {
            navigator.clipboard.writeText(getRawUrl(pendingAccessScript.id));
            showToast("Raw URL copied!");
        }
    }

    function copyLoadstring() {
        if (pendingAccessScript) {
            navigator.clipboard.writeText(getLoadstring(pendingAccessScript.id));
            showToast("Loadstring copied!");
        }
    }

    function closeAccessModal() {
        document.getElementById('accessModal').classList.add('hidden');
        pendingAccessScript = null;
    }

    function closeViewerModal() {
        document.getElementById('scriptViewerModal').classList.add('hidden');
        pendingAccessScript = null;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderMyScripts() {
        var container = document.getElementById('scriptsList');
        if (scriptsDatabase.length === 0) {
            container.innerHTML = '<div class="empty-state">No scripts uploaded yet. Click UPLOAD to add your first script.</div>';
            return;
        }

        var html = '';
        for (var i = 0; i < scriptsDatabase.length; i++) {
            var script = scriptsDatabase[i];
            var isExpired = script.expire && new Date(script.expire) < new Date();
            var statusClass = isExpired ? 'badge-expired' : 'badge-active';
            var statusText = isExpired ? 'EXPIRED' : 'ACTIVE';
            var visibilityClass = script.visibility === 'private' ? 'badge-private' : 'badge-public';

            html += '<div class="script-item">';
            html += '<div class="script-info">';
            html += '<h4>' + escapeHtml(script.name) + '</h4>';
            html += '<p>ID: ' + escapeHtml(script.id) + ' | Category: ' + escapeHtml(script.category) + ' | Visibility: ' + script.visibility + ' | Views: ' + (script.views || 0) + '</p>';
            if (script.expire) html += '<p>Expires: ' + new Date(script.expire).toLocaleDateString() + '</p>';
            html += '<div><span class="badge ' + statusClass + '">' + statusText + '</span> <span class="badge ' + visibilityClass + '">' + script.visibility.toUpperCase() + '</span></div>';
            html += '</div>';
            html += '<div>';
            html += '<div class="script-url" onclick="navigator.clipboard.writeText(\'' + getRawUrl(script.id) + '\')">📋 RAW URL</div>';
            html += '<div class="script-url" style="margin-top:6px;" onclick="navigator.clipboard.writeText(\'' + getLoadstring(script.id) + '\')">📋 LOADSTRING</div>';
            html += '</div>';
            html += '<div style="display:flex; gap:8px;">';
            html += '<button class="btn btn-outline btn-sm" onclick="viewScript(' + JSON.stringify(script).replace(/"/g, '&quot;') + ')">VIEW</button>';
            html += '<button class="btn btn-danger btn-sm" onclick="deleteScript(\'' + script.id + '\')">DELETE</button>';
            html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }

    function showUploadSection(show) {
        var uploadSection = document.getElementById('uploadSection');
        if (show) {
            uploadSection.style.display = 'block';
        } else {
            uploadSection.style.display = 'none';
        }
    }

    function showMyScripts(show) {
        var myScriptsSection = document.getElementById('myScriptsSection');
        if (show) {
            myScriptsSection.style.display = 'block';
            renderMyScripts();
        } else {
            myScriptsSection.style.display = 'none';
        }
    }

    function handleRawAccess() {
        var urlParams = new URLSearchParams(window.location.search);
        var rawId = urlParams.get('raw');
        if (rawId) {
            var script = null;
            for (var i = 0; i < scriptsDatabase.length; i++) {
                if (scriptsDatabase[i].id === rawId) {
                    script = scriptsDatabase[i];
                    break;
                }
            }
            if (script) {
                var isExpired = script.expire && new Date(script.expire) < new Date();
                if (isExpired) {
                    document.body.innerHTML = '<div style="text-align:center; padding:50px; color:#c41e1e; font-family:monospace;">[EXPIRED] This script has expired.</div>';
                    return;
                }
                var keyParam = urlParams.get('key');
                if (script.visibility === 'private' && script.requiredKey && script.requiredKey !== "") {
                    if (keyParam !== script.requiredKey) {
                        document.body.innerHTML = '<div style="text-align:center; padding:50px; color:#c41e1e; font-family:monospace;">[PRIVATE] Key required. Add ?key=YOUR_KEY to URL</div>';
                        return;
                    }
                }
                script.views = (script.views || 0) + 1;
                saveToLocal();
                document.body.innerHTML = '<pre style="background:#0a0404; color:#c4a0a0; padding:24px; margin:0; font-family:monospace; font-size:12px; white-space:pre-wrap;">' + escapeHtml(script.code) + '</pre>';
            } else {
                document.body.innerHTML = '<div style="text-align:center; padding:50px; color:#c41e1e; font-family:monospace;">[404] Script not found</div>';
            }
        }
    }

    // File upload handler
    function setupFileUpload() {
        var fileArea = document.getElementById('fileUploadArea');
        var fileInput = document.getElementById('fileInput');

        fileArea.onclick = function() {
            fileInput.click();
        };

        fileInput.onchange = function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(evt) {
                    document.getElementById('scriptCode').value = evt.target.result;
                    showToast("File loaded: " + file.name);
                };
                reader.readAsText(file);
            }
        };

        fileArea.ondragover = function(e) {
            e.preventDefault();
            fileArea.style.borderColor = '#c41e1e';
        };
        fileArea.ondragleave = function(e) {
            e.preventDefault();
            fileArea.style.borderColor = '#2a1515';
        };
        fileArea.ondrop = function(e) {
            e.preventDefault();
            fileArea.style.borderColor = '#2a1515';
            var file = e.dataTransfer.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(evt) {
                    document.getElementById('scriptCode').value = evt.target.result;
                    showToast("File loaded: " + file.name);
                };
                reader.readAsText(file);
            }
        };
    }

    // Visibility toggle
    document.getElementById('scriptVisibility').addEventListener('change', function(e) {
        var keyGroup = document.getElementById('keyRequireGroup');
        if (e.target.value === 'private') {
            keyGroup.style.display = 'block';
        } else {
            keyGroup.style.display = 'none';
            document.getElementById('requiredKey').value = '';
        }
    });

    // Event listeners
    document.getElementById('btnUpload').onclick = function() { showUploadSection(true); showMyScripts(false); };
    document.getElementById('btnMyScripts').onclick = function() { showMyScripts(true); showUploadSection(false); };
    document.getElementById('closeUploadBtn').onclick = function() { showUploadSection(false); };
    document.getElementById('closeMyScriptsBtn').onclick = function() { showMyScripts(false); };
    document.getElementById('uploadScriptBtn').onclick = uploadScript;
    document.getElementById('copyRawBtn').onclick = copyRawUrl;
    document.getElementById('copyLoadstringBtn').onclick = copyLoadstring;

    window.viewScript = viewScript;
    window.deleteScript = deleteScript;
    window.verifyAndAccessScript = verifyAndAccessScript;
    window.closeAccessModal = closeAccessModal;
    window.closeViewerModal = closeViewerModal;

    loadFromLocal();
    handleRawAccess();
    setupFileUpload();
</script>
</body>
</html>
