<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ByokuXMon | Private Script Hosting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #060a0f;
            --bg-panel: #0b1118;
            --bg-card: #0f1923;
            --bg-hover: #141f2e;
            --border: #1a2d3f;
            --border-bright: #1e3a50;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-glow: rgba(0,255,136,0.15);
            --red: #ff3355;
            --red-dim: #cc2244;
            --red-glow: rgba(255,51,85,0.15);
            --blue: #00aaff;
            --yellow: #ffcc00;
            --orange: #ff8800;
            --purple: #aa55ff;
            --gold: #c9a03d;
            --gold-glow: rgba(201,160,61,0.15);
            --text-primary: #e0eeff;
            --text-secondary: #7a9ab8;
            --text-dim: #3a5570;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
            --font-display: 'Orbitron', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 14px;
            min-height: 100vh;
        }
        #scanlines {
            position: fixed;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--gold), #8b6914);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 20px; font-weight: 800; color: #060a0f;
        }
        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 18px;
        }
        .logo-text h1 span { color: var(--gold); }
        .logo-text p {
            font-family: var(--font-mono);
            font-size: 8px;
            color: var(--text-dim);
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b6914, var(--gold));
            color: #060a0f;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--gold-glow); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover { background: var(--gold-glow); }
        .btn-danger {
            background: var(--red-glow);
            border: 1px solid var(--red);
            color: var(--red);
        }
        .btn-sm { padding: 5px 12px; font-size: 9px; }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
            display: inline-block;
            margin-right: 6px;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card-body { padding: 20px; }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 8px var(--gold-glow);
        }
        textarea {
            font-family: monospace;
            resize: vertical;
            min-height: 200px;
        }

        /* Script List */
        .script-item {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .script-info h4 {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--gold);
        }
        .script-info p {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
        }
        .script-url {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--green);
            background: var(--bg-deep);
            padding: 6px 12px;
            border-radius: 20px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
        }
        .badge-private { background: rgba(255,51,85,0.15); color: var(--red); }
        .badge-public { background: rgba(0,255,136,0.15); color: var(--green); }
        .badge-active { background: rgba(0,255,136,0.15); color: var(--green); }
        .badge-expired { background: rgba(255,51,85,0.15); color: var(--red); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-panel);
            border-left: 3px solid var(--gold);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1100;
            font-family: var(--font-mono);
            font-size: 12px;
            animation: slideIn 0.3s ease;
        }
        .toast.error { border-left-color: var(--red); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(6,10,15,0.98);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--gold);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .modal-close { cursor: pointer; color: var(--text-dim); font-size: 20px; }
        .modal-body { padding: 20px; }
        .hidden { display: none; }

        /* Code preview */
        .code-preview {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow: auto;
        }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .script-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div id="scanlines"></div>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">SH</div>
            <div class="logo-text">
                <h1>BYOKUX<span>MON</span></h1>
                <p>PRIVATE SCRIPT HOSTING</p>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn btn-outline btn-sm" id="btnMyScripts">MY SCRIPTS</button>
            <button class="btn btn-primary btn-sm" id="btnUpload">+ UPLOAD</button>
        </div>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="uploadSection" class="card">
        <div class="card-header">
            <span class="card-title"><span class="pulse-dot"></span> UPLOAD NEW SCRIPT</span>
            <button class="btn btn-outline btn-sm" id="closeUploadBtn" style="display:none;">CLOSE</button>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label>SCRIPT NAME</label>
                <input type="text" id="scriptName" placeholder="ex: Auto Farm GUI v2">
            </div>
            <div class="form-group">
                <label>CATEGORY</label>
                <select id="scriptCategory">
                    <option value="Roblox">Roblox Executor</option>
                    <option value="Utility">Utility</option>
                    <option value="Aimbot">Aimbot / ESP</option>
                    <option value="Macro">Macro / Auto</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>VISIBILITY</label>
                <select id="scriptVisibility">
                    <option value="private">PRIVATE (Need Key to Access)</option>
                    <option value="public">PUBLIC (Anyone can see)</option>
                </select>
            </div>
            <div class="form-group" id="keyRequireGroup" style="display:none;">
                <label>REQUIRED KEY (Optional - leave empty for no key)</label>
                <input type="text" id="requiredKey" placeholder="Key required to access this script">
                <small style="color:var(--text-dim);">User perlu punya key ini buat akses script</small>
            </div>
            <div class="form-group">
                <label>EXPIRE DATE (Optional)</label>
                <input type="date" id="expireDate">
                <small style="color:var(--text-dim);">Kosongkan jika tidak mau expired</small>
            </div>
            <div class="form-group">
                <label>SCRIPT CODE (LUA / JS / PYTHON)</label>
                <textarea id="scriptCode" placeholder="-- Paste your script here&#10;loadstring(game:HttpGet('...'))()"></textarea>
            </div>
            <button class="btn btn-primary" id="uploadScriptBtn" style="width:100%">🚀 UPLOAD SCRIPT</button>
        </div>
    </div>

    <!-- MY SCRIPTS SECTION -->
    <div id="myScriptsSection" class="card" style="display:none;">
        <div class="card-header">
            <span class="card-title"><span class="pulse-dot"></span> MY SCRIPTS</span>
            <button class="btn btn-outline btn-sm" id="closeMyScriptsBtn">CLOSE</button>
        </div>
        <div class="card-body" id="scriptsList">
            <div style="text-align:center; color:var(--text-dim);">Loading...</div>
        </div>
    </div>

    <!-- ACCESS SCRIPT VIEW (for public/private) -->
    <div id="accessScriptModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color:var(--gold);">🔒 SCRIPT PROTECTED</h3>
                <span class="modal-close" onclick="closeAccessModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:16px;">Script ini bersifat <strong>PRIVATE</strong>. Masukkan key untuk mengakses:</p>
                <input type="text" id="accessKeyInput" placeholder="Enter your license key" style="width:100%; padding:10px; background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary); border-radius:6px;">
                <button class="btn btn-primary" onclick="verifyAndShowScript()" style="width:100%; margin-top:16px;">VERIFY & ACCESS</button>
                <div id="accessError" style="color:var(--red); font-size:11px; margin-top:12px;"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPT VIEWER MODAL -->
    <div id="scriptViewerModal" class="modal hidden">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="viewerTitle" style="color:var(--gold);">SCRIPT PREVIEW</h3>
                <span class="modal-close" onclick="closeViewerModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="code-preview" id="scriptContentPreview"></div>
                <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
                    <button class="btn btn-primary" id="copyRawBtn">📋 COPY RAW</button>
                    <button class="btn btn-outline" id="copyLoadstringBtn">📋 COPY LOADSTRING</button>
                </div>
                <div id="rawUrlDisplay" style="margin-top:12px; font-family:monospace; font-size:10px; color:var(--text-dim); text-align:center;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // STORAGE
    let scripts = [];
    let currentUser = "owner";
    let currentViewingScript = null;

    function loadData() {
        const saved = localStorage.getItem('bxm_scripts');
        if (saved) scripts = JSON.parse(saved);
        else {
            // Demo scripts
            scripts = [
                { id: "SCR-1A2B3C", name: "Auto Farm GUI", category: "Roblox", visibility: "public", code: "-- Auto Farm Script\nlocal player = game.Players.LocalPlayer\nwhile wait(1) do\n    print('Farming...')\nend", created: new Date().toISOString(), views: 0 },
                { id: "SCR-4D5E6F", name: "Aimbot v3", category: "Aimbot", visibility: "private", requiredKey: "VIP-KEY-123", code: "-- Aimbot Script\n-- Requires VIP key to access", created: new Date().toISOString(), views: 0 }
            ];
            saveData();
        }
        renderMyScripts();
    }

    function saveData() {
        localStorage.setItem('bxm_scripts', JSON.stringify(scripts));
    }

    function generateScriptId() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let id = "";
        for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * 36)];
        return `SCR-${id}`;
    }

    function showToast(msg, type = "success") {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function uploadScript() {
        const name = document.getElementById('scriptName').value.trim();
        const category = document.getElementById('scriptCategory').value;
        const visibility = document.getElementById('scriptVisibility').value;
        const code = document.getElementById('scriptCode').value;
        const requiredKey = document.getElementById('requiredKey').value.trim();
        const expireDate = document.getElementById('expireDate').value;

        if (!name) { showToast("Script name required", "error"); return; }
        if (!code) { showToast("Script code required", "error"); return; }

        const newScript = {
            id: generateScriptId(),
            name: name,
            category: category,
            visibility: visibility,
            code: code,
            requiredKey: visibility === 'private' ? requiredKey : null,
            expire: expireDate || null,
            created: new Date().toISOString(),
            views: 0,
            owner: currentUser
        };

        scripts.push(newScript);
        saveData();
        renderMyScripts();

        // Clear form
        document.getElementById('scriptName').value = '';
        document.getElementById('scriptCode').value = '';
        document.getElementById('requiredKey').value = '';
        document.getElementById('expireDate').value = '';

        showToast(`Script uploaded! ID: ${newScript.id}`);
        showUploadSection(false);
        showMyScripts(true);
    }

    function deleteScript(scriptId) {
        if (confirm("Delete this script? It will be gone forever.")) {
            scripts = scripts.filter(s => s.id !== scriptId);
            saveData();
            renderMyScripts();
            showToast("Script deleted");
        }
    }

    function getRawUrl(scriptId) {
        return `${window.location.origin}${window.location.pathname}?raw=${scriptId}`;
    }

    function getLoadstring(scriptId) {
        return `loadstring(game:HttpGet("${getRawUrl(scriptId)}"))()`;
    }

    function viewScript(script) {
        currentViewingScript = script;
        
        // Check if expired
        if (script.expire && new Date(script.expire) < new Date()) {
            showToast("This script has expired!", "error");
            return;
        }

        // If public, show directly
        if (script.visibility === 'public') {
            showScriptContent(script);
        } else {
            // Private, need key
            document.getElementById('accessModal').classList.remove('hidden');
            document.getElementById('accessKeyInput').value = '';
            document.getElementById('accessError').innerHTML = '';
        }
    }

    function verifyAndShowScript() {
        const inputKey = document.getElementById('accessKeyInput').value.trim();
        const script = currentViewingScript;

        if (!script.requiredKey || script.requiredKey === "") {
            showScriptContent(script);
            return;
        }

        if (inputKey === script.requiredKey) {
            showScriptContent(script);
        } else {
            document.getElementById('accessError').innerHTML = "Invalid key! Cannot access this script.";
        }
    }

    function showScriptContent(script) {
        closeAccessModal();
        
        // Increment views
        script.views = (script.views || 0) + 1;
        saveData();
        renderMyScripts();

        document.getElementById('viewerTitle').innerHTML = `${script.name} <span style="font-size:10px;">(${script.category})</span>`;
        document.getElementById('scriptContentPreview').innerHTML = escapeHtml(script.code);
        document.getElementById('rawUrlDisplay').innerHTML = `RAW URL: ${getRawUrl(script.id)}<br>LOADSTRING: ${getLoadstring(script.id)}`;
        
        document.getElementById('scriptViewerModal').classList.remove('hidden');
    }

    function copyRawUrl() {
        if (currentViewingScript) {
            navigator.clipboard.writeText(getRawUrl(currentViewingScript.id));
            showToast("Raw URL copied!");
        }
    }

    function copyLoadstring() {
        if (currentViewingScript) {
            navigator.clipboard.writeText(getLoadstring(currentViewingScript.id));
            showToast("Loadstring copied! Use in executor: loadstring(...)()");
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function renderMyScripts() {
        const container = document.getElementById('scriptsList');
        if (scripts.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:var(--text-dim);">No scripts uploaded yet. Click UPLOAD to add your first script.</div>';
            return;
        }

        container.innerHTML = scripts.map(script => {
            const isExpired = script.expire && new Date(script.expire) < new Date();
            const statusClass = isExpired ? 'badge-expired' : 'badge-active';
            const statusText = isExpired ? 'EXPIRED' : 'ACTIVE';
            
            return `
                <div class="script-item">
                    <div class="script-info">
                        <h4>${escapeHtml(script.name)}</h4>
                        <p>ID: ${script.id} | Category: ${script.category} | Visibility: ${script.visibility} | Views: ${script.views || 0}</p>
                        ${script.expire ? `<p>Expires: ${new Date(script.expire).toLocaleDateString()}</p>` : ''}
                        <div><span class="badge ${statusClass}">${statusText}</span></div>
                    </div>
                    <div>
                        <div class="script-url" onclick="navigator.clipboard.writeText('${getRawUrl(script.id)}')">📋 RAW URL</div>
                        <div class="script-url" style="margin-top:5px;" onclick="navigator.clipboard.writeText('${getLoadstring(script.id)}')">📋 LOADSTRING</div>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-outline btn-sm" onclick="viewScript(${JSON.stringify(script).replace(/"/g, '&quot;')})">VIEW</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteScript('${script.id}')">DELETE</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showUploadSection(show) {
        document.getElementById('uploadSection').style.display = show ? 'block' : 'none';
        if (!show) {
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptCode').value = '';
        }
    }

    function showMyScripts(show) {
        document.getElementById('myScriptsSection').style.display = show ? 'block' : 'none';
        if (show) renderMyScripts();
    }

    function closeAccessModal() {
        document.getElementById('accessScriptModal').classList.add('hidden');
    }

    function closeViewerModal() {
        document.getElementById('scriptViewerModal').classList.add('hidden');
        currentViewingScript = null;
    }

    // Handle RAW access via URL parameter
    function handleRawAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        const rawId = urlParams.get('raw');
        if (rawId) {
            const script = scripts.find(s => s.id === rawId);
            if (script) {
                // Check expired
                if (script.expire && new Date(script.expire) < new Date()) {
                    document.body.innerHTML = `<div style="text-align:center; padding:50px; color:var(--red);">⚠️ SCRIPT EXPIRED ⚠️</div>`;
                    return;
                }
                // If private, check if accessed via valid referer or just show raw (bisa tetap diakses lewat executor)
                // For executor loadstring, we allow access but we can add key check if needed
                if (script.visibility === 'private') {
                    // Optional: check for key in header or param
                    const keyParam = urlParams.get('key');
                    if (script.requiredKey && keyParam !== script.requiredKey) {
                        // Still allow? To be safe for executor, we can still return but with warning
                        // For security, return error
                        document.body.innerHTML = `<div style="text-align:center; padding:50px; color:var(--red);">🔒 PRIVATE SCRIPT - KEY REQUIRED 🔒<br>Add ?key=YOUR_KEY to URL</div>`;
                        return;
                    }
                }
                // Increment view
                script.views = (script.views || 0) + 1;
                saveData();
                // Return raw content
                document.body.innerHTML = `<pre style="background:#060a0f; color:#00ff88; padding:20px; margin:0; font-family:monospace;">${escapeHtml(script.code)}</pre>`;
            } else {
                document.body.innerHTML = `<div style="text-align:center; padding:50px; color:var(--red);">❌ SCRIPT NOT FOUND ❌</div>`;
            }
        }
    }

    // Visibility toggle
    document.getElementById('scriptVisibility').addEventListener('change', (e) => {
        const keyGroup = document.getElementById('keyRequireGroup');
        if (e.target.value === 'private') {
            keyGroup.style.display = 'block';
        } else {
            keyGroup.style.display = 'none';
            document.getElementById('requiredKey').value = '';
        }
    });

    // Event listeners
    document.getElementById('btnUpload').onclick = () => { showUploadSection(true); showMyScripts(false); };
    document.getElementById('btnMyScripts').onclick = () => { showMyScripts(true); showUploadSection(false); };
    document.getElementById('closeUploadBtn').onclick = () => { showUploadSection(false); };
    document.getElementById('closeMyScriptsBtn').onclick = () => { showMyScripts(false); };
    document.getElementById('uploadScriptBtn').onclick = uploadScript;
    document.getElementById('copyRawBtn').onclick = copyRawUrl;
    document.getElementById('copyLoadstringBtn').onclick = copyLoadstring;

    // Initial load
    loadData();
    handleRawAccess();
</script>
</body>
</html>
